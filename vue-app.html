<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Vue.js App</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .app {
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #42b883;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
        }
        button:hover {
            background: #35495e;
        }
        .counter {
            font-size: 48px;
            margin: 20px 0;
            color: #35495e;
        }
        .items {
            margin-top: 20px;
        }
        .item {
            padding: 8px;
            margin: 5px 0;
            background: #f0f0f0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item button {
            padding: 5px 10px;
            font-size: 12px;
            background: #ff6b6b;
        }
        input {
            padding: 8px;
            font-size: 16px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        h1 {
            color: #42b883;
        }
        .api-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .users {
            text-align: left;
        }
        .user-card {
            padding: 12px;
            margin: 8px 0;
            background: white;
            border-radius: 4px;
            border: 1px solid #dee2e6;
        }
        .user-card strong {
            color: #35495e;
            display: block;
            margin-bottom: 4px;
        }
        .user-card p {
            margin: 0;
            color: #6c757d;
            font-size: 14px;
        }
        .loading {
            color: #42b883;
        }
        .error {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app">
            <h1>💚 Simple Vue.js App</h1>

            <div>
                <p>Counter Example:</p>
                <div class="counter">{{ count }}</div>
                <button @click="increment">
                    Count: {{ count }}
                </button>
            </div>

            <div class="items">
                <h3>Todo List</h3>
                <div>
                    <input
                        v-model="inputValue"
                        @keyup.enter="addItem"
                        placeholder="Add new item..."
                    />
                    <button @click="addItem">Add</button>
                </div>
                <div v-for="(item, index) in items" :key="index" class="item">
                    {{ item }}
                    <button @click="removeItem(index)">Remove</button>
                </div>
                <p v-if="items.length === 0">No items yet!</p>
            </div>

            <!-- Fetch API Example -->
            <div class="api-section">
                <h3>📡 API Data (Fetch + onMounted)</h3>
                <p v-if="loading" class="loading">Loading users...</p>
                <p v-if="error" class="error">Error: {{ error }}</p>
                <div v-if="!loading && !error" class="users">
                    <div v-for="user in users" :key="user.id" class="user-card">
                        <strong>{{ user.name }}</strong>
                        <p>{{ user.email }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const count = ref(0);
                const items = ref(['Learn Vue', 'Build an app']);
                const inputValue = ref('');

                // Fetch API state
                const users = ref([]);
                const loading = ref(true);
                const error = ref(null);

                // Fetch users on component mount
                onMounted(async () => {
                    try {
                        const response = await fetch('https://jsonplaceholder.typicode.com/users?_limit=5');
                        if (!response.ok) {
                            throw new Error('Failed to fetch');
                        }
                        users.value = await response.json();
                    } catch (err) {
                        error.value = err.message;
                    } finally {
                        loading.value = false;
                    }
                });

                const increment = () => {
                    count.value++;
                };

                const addItem = () => {
                    if (inputValue.value.trim()) {
                        items.value.push(inputValue.value.trim());
                        inputValue.value = '';
                    }
                };

                const removeItem = (index) => {
                    items.value.splice(index, 1);
                };

                return {
                    count,
                    items,
                    inputValue,
                    users,
                    loading,
                    error,
                    increment,
                    addItem,
                    removeItem
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
